name: Deploy Marp HTML to Azure Blob

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      COURSE_SLUG: marp-template
      COURSE_ENTRY: build/examples/template-demo.md
      STATIC_WEBSITE_ENDPOINT: ${{ vars.STATIC_WEBSITE_ENDPOINT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Render Markdown
        run: npm run render

      - name: Prepare deploy folder
        run: |
          mkdir -p public/${COURSE_SLUG}

          # Copier les assets dans le dossier publié
          cp -R assets public/${COURSE_SLUG}/assets

          # Copier le markdown généré et le thème dans une version temporaire adaptée au web
          cp "${COURSE_ENTRY}" public/${COURSE_SLUG}/index.md
          cp themes/coubiac.css public/${COURSE_SLUG}/coubiac.deploy.css

          # Adapter les chemins relatifs pour la publication dans /${COURSE_SLUG}/
          perl -pi -e 's#\.\./assets/#assets/#g' public/${COURSE_SLUG}/index.md
          perl -pi -e 's#\.\./assets/#assets/#g' public/${COURSE_SLUG}/coubiac.deploy.css

      - name: Export HTML
        run: |
          npx marp public/${COURSE_SLUG}/index.md \
            --theme public/${COURSE_SLUG}/coubiac.deploy.css \
            --html \
            --allow-local-files \
            -o public/${COURSE_SLUG}/index.html

          # Supprimer les fichiers temporaires non nécessaires à la publication
          rm public/${COURSE_SLUG}/index.md
          rm public/${COURSE_SLUG}/coubiac.deploy.css

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload to Azure Blob Static Website
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
              --destination '$web' \
              --destination-path "${COURSE_SLUG}" \
              --source "public/${COURSE_SLUG}" \
              --overwrite true \
              --auth-mode login
    
      - name: Show deployed URL
        run: |
          SITE_URL="${STATIC_WEBSITE_ENDPOINT%/}/${COURSE_SLUG}/"

          echo "### Support publié" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL : ${SITE_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Slug : ${COURSE_SLUG}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Ouvrir le support](${SITE_URL})" >> "$GITHUB_STEP_SUMMARY"

          echo "Support publié : ${SITE_URL}"
              