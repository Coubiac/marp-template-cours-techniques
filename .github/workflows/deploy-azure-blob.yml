name: Deploy Marp HTML to Azure Blob

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      COURSE_SLUG: marp-template
      COURSE_ENTRY: build/examples/template-demo.md

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Render Markdown
        run: npm run render

      - name: Export HTML
        run: |
          mkdir -p public/${COURSE_SLUG}

          npx marp ${COURSE_ENTRY} \
            --theme themes/coubiac.css \
            --html \
            --allow-local-files \
            -o public/${COURSE_SLUG}/index.html

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload to Azure Blob Static Website
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
              --destination '$web' \
              --destination-path "${COURSE_SLUG}" \
              --source "public/${COURSE_SLUG}" \
              --overwrite true \
              --auth-mode login